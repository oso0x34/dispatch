name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-release:
    name: Linux Release
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "expected release tag ${expected_tag}, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Run Rust test suite
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Run frontend test suite
        run: npm test

      - name: Run Phase 10 release smoke
        run: bash scripts/smoke/phase-10-release.sh

      - name: Upload AppImage bundle (Actions artifact)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-appimage-${{ github.ref_name }}
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload deb bundle (Actions artifact)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-deb-${{ github.ref_name }}
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dispatch ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
          fail_on_unmatched_files: true
